<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">AI Shorts Agent control room interface</title>
  <desc id="desc">A stylized product interface showing a multi-client shorts automation dashboard, video previews, job logs, metrics, and pipeline status.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08231f"/>
      <stop offset="0.46" stop-color="#123b2f"/>
      <stop offset="1" stop-color="#f05a3c"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fff3"/>
      <stop offset="1" stop-color="#d8f5df"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10231f"/>
      <stop offset="1" stop-color="#02110f"/>
    </linearGradient>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M 52 0 L 0 0 0 52" fill="none" stroke="#d8ff70" stroke-opacity="0.16" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#04110e" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1800" height="1100" fill="url(#sky)"/>
  <rect width="1800" height="1100" fill="url(#grid)" opacity="0.7"/>
  <path d="M-80 880 C340 730 450 1020 860 790 C1190 604 1430 672 1880 500 L1880 1100 L-80 1100 Z" fill="#fff6de" opacity="0.95"/>
  <path d="M-80 946 C360 820 520 1000 890 838 C1210 700 1490 754 1880 612 L1880 1100 L-80 1100 Z" fill="#c8ff59" opacity="0.36"/>

  <g filter="url(#softShadow)">
    <rect x="235" y="205" width="1330" height="640" rx="38" fill="#10221e" stroke="#f8fff3" stroke-opacity="0.25"/>
    <rect x="276" y="250" width="1250" height="550" rx="28" fill="#f8fff3"/>

    <rect x="316" y="293" width="300" height="462" rx="24" fill="#10221e"/>
    <rect x="343" y="330" width="246" height="350" rx="26" fill="url(#phone)"/>
    <rect x="369" y="360" width="194" height="112" rx="20" fill="#f05a3c"/>
    <circle cx="466" cy="416" r="38" fill="#fff6de"/>
    <path d="M429 470 C457 438 484 438 514 470 L543 520 L389 520 Z" fill="#c8ff59"/>
    <rect x="369" y="542" width="194" height="18" rx="9" fill="#f8fff3"/>
    <rect x="369" y="578" width="144" height="14" rx="7" fill="#8fe7d1"/>
    <rect x="369" y="618" width="92" height="26" rx="13" fill="#c8ff59"/>
    <text x="342" y="720" fill="#c8ff59" font-family="IBM Plex Mono, Consolas, monospace" font-size="18">preview_1080x1920.mp4</text>

    <rect x="660" y="293" width="378" height="214" rx="22" fill="#123b2f"/>
    <text x="696" y="343" fill="#c8ff59" font-family="IBM Plex Mono, Consolas, monospace" font-size="22">run_completed</text>
    <rect x="696" y="378" width="275" height="14" rx="7" fill="#f8fff3" opacity="0.72"/>
    <rect x="696" y="416" width="232" height="14" rx="7" fill="#f8fff3" opacity="0.52"/>
    <rect x="696" y="454" width="308" height="14" rx="7" fill="#f8fff3" opacity="0.62"/>
    <circle cx="980" cy="342" r="20" fill="#f05a3c"/>

    <rect x="1080" y="293" width="404" height="214" rx="22" fill="#f8fff3" stroke="#123b2f" stroke-opacity="0.2"/>
    <text x="1118" y="343" fill="#123b2f" font-family="IBM Plex Mono, Consolas, monospace" font-size="20">client channels</text>
    <rect x="1118" y="382" width="270" height="36" rx="18" fill="#d8f5df"/>
    <rect x="1118" y="438" width="210" height="36" rx="18" fill="#fff6de"/>
    <rect x="1118" y="494" width="302" height="36" rx="18" fill="#fdd4c7"/>

    <rect x="660" y="542" width="824" height="213" rx="22" fill="#f4ffed" stroke="#123b2f" stroke-opacity="0.18"/>
    <g fill="none" stroke-width="9" stroke-linecap="round">
      <path d="M720 694 C820 576 927 704 1012 604 C1094 508 1195 646 1308 554 C1368 506 1418 518 1454 496" stroke="#123b2f" opacity="0.18"/>
      <path d="M720 694 C820 576 927 704 1012 604 C1094 508 1195 646 1308 554 C1368 506 1418 518 1454 496" stroke="#f05a3c" stroke-dasharray="1 28"/>
      <path d="M720 694 C820 576 927 704 1012 604 C1094 508 1195 646 1308 554 C1368 506 1418 518 1454 496" stroke="#00a896" stroke-dasharray="250 700"/>
    </g>
    <text x="696" y="604" fill="#123b2f" font-family="IBM Plex Mono, Consolas, monospace" font-size="20">metrics stream</text>
    <text x="696" y="730" fill="#123b2f" font-family="IBM Plex Mono, Consolas, monospace" font-size="16">quota: 1/3 uploads today</text>
  </g>

  <g opacity="0.88">
    <circle cx="1540" cy="178" r="10" fill="#c8ff59"/>
    <circle cx="1590" cy="220" r="7" fill="#fff6de"/>
    <circle cx="202" cy="824" r="8" fill="#f05a3c"/>
  </g>
</svg>
